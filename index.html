<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.6.0/font/bootstrap-icons.css" integrity="sha384-7ynz3n3tAGNUYFZD3cWe5PDcE36xj85vyFkawcF6tIwxvIecqKvfwLiaFdizhPpN" crossorigin="anonymous">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- CONFIG primero, antes que cualquier otro script -->
    <script src="./config.js"></script>
</head>
<body>

    <div class="background"></div>

    <div class="audiodiv">
        <audio id="myAudio" preload="auto">
            <source src="" type="audio/mpeg">
        </audio>
        <div id="playPauseBtn" class="play">
            <img src="./img/notamusical.png" alt="Icono de música">
        </div>
    </div>

    <p data-aos="fade-up" class="titulocontador">Faltan:</p>
    <div class="contador">
        <div class="bloque">
            <div data-aos="fade-up" id="dias" class="numero"></div>
            <div data-aos="fade-up" class="etiqueta">Días</div>
        </div>
        <div class="bloque">
            <div data-aos="fade-up" id="horas" class="numero"></div>
            <div data-aos="fade-up" class="etiqueta">horas</div>
        </div>
        <div class="bloque">
            <div data-aos="fade-up" id="minutos" class="numero"></div>
            <div data-aos="fade-up" class="etiqueta">minutos</div>
        </div>
        <div class="bloque">
            <div data-aos="fade-up" id="segundos" class="numero"></div>
            <div data-aos="fade-up" class="etiqueta">segundos</div>
        </div>
    </div>

    <div class="datos-ubicacion">
        <div>
            <img data-aos="fade-down" src="./img-editable/icono1.png" alt="">
        </div>
        <div>
            <img class="fecha" data-aos="fade-down" src="./img-editable/fecha.png" alt="">
        </div>
        <div class="datos">
            <div>
                <p data-aos="fade-up" id="texto-ubicacion"></p>
                <div class="botones">
                    <a data-aos="fade-up" class="boton" target="_blank"  href="https://www.google.com/maps/dir//Parroquia+San+Gabriel+Arc%C3%A1ngel,+Pl.+Almte+Brown+145,+B1846+Adrogu%C3%A9,+Provincia+de+Buenos+Aires/@-34.7981282,-58.3835095,17z/data=!4m17!1m7!3m6!1s0x95bcd347e6ea7a2f:0x6c82f3ad050f39b4!2sParroquia+San+Gabriel+Arc%C3%A1ngel!8m2!3d-34.7981282!4d-58.3835095!16s%2Fg%2F1tdfjwp7!4m8!1m0!1m5!1m1!1s0x95bcd347e6ea7a2f:0x6c82f3ad050f39b4!2m2!1d-58.3836316!2d-34.7981181!3e0!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDUwNi4wIKXMDSoASAFQAw%3D%3D">CÓMO LLEGAR</a>
                </div>
            </div>
        </div>
         <div class="datos">
            <div>
                <p data-aos="fade-up" id="texto-ubicacion2"></p>
                <div class="botones">
                    <a data-aos="fade-up" class="boton" target="_blank"  href="https://www.google.com/maps/dir//La+Carmela,+S+J+Bynnon+2615,+Jos++M+rmol,+Buenos+Aires,+Jorge+Santiago+Bynnon+2615,+Jos%C3%A9+Marmol,+Provincia+de+Buenos+Aires/@-34.7890687,-58.373926,17z/data=!4m17!1m7!3m6!1s0x95bcd3335dbb9655:0x5df722b3f2f483c2!2sLa+Carmela!8m2!3d-34.7890687!4d-58.373926!16s%2Fg%2F1q62k4h8g!4m8!1m0!1m5!1m1!1s0x95bcd3335dbb9655:0x5df722b3f2f483c2!2m2!1d-58.3739261!2d-34.7890685!3e0!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDUwNi4wIKXMDSoASAFQAw%3D%3D">CÓMO LLEGAR</a>
                </div>
            </div>
        </div>
    </div>

    <div class="fotos">
        <img src="./img-editable/fotos1.png" alt="">
        <div class="icono2">
            <img data-aos="fade-down" src="./img-editable/icono2.png" alt="">
        </div>
        <div class="icono3">
            <img data-aos="fade-up" src="./img-editable/icono3.png" alt="">
        </div>
    </div>

    <div class="forms">
        <form name="asistenciaform" method="POST" action="#" class="formulario">
            <img data-aos="fade-down" src="./img-editable/icono4.png" alt="">
            <label data-aos="fade-up" class="formtitle" id="form-title"></label>
            <p data-aos="fade-up" id="form-sub"></p>

      
    <a data-aos="fade-up" class="boton" id="btn-confirmar" href="#" target="_blank">CONFIRMAR ASISTENCIA</a>
    <a data-aos="fade-up" class="boton" target="_blank"  href="https://calendar.app.google/fSbvCLJugN3k9zHo6">AGENDAR</a>

        </form>
    </div>

    <div class="fotos">
        <img src="./img-editable/fotos2.png" alt="">
        <div class="icono2">
            <img data-aos="fade-down" src="./img-editable/icono2.png" alt="">
        </div>
        <div class="icono3">
            <img data-aos="fade-up" src="./img-editable/icono3.png" alt="">
        </div>
    </div>

    <div class="end">
        <img data-aos="fade-down" src="./img-editable/icono1.png" alt="">
        <h2 data-aos="fade-up" id="nombre-end"></h2>
        <p data-aos="fade-down" id="subtitulo-end"></p>
    </div>

    <footer>
        <div class="contenido">
            <div>
                <img src="./img/logo.png" alt="icono si quiero">
                <p>Hecho con &hearts; <br>
                &#169 <b>VOY! - INVITACIONES WEB</b> - invitaciones inteligentes.
                <br> Todos los derechos reservados.</p>
            </div>
            <div class="contenido-list">
                <ul>
                    <li><a target="_blank" href=""><i class="bi bi-instagram"></i></a></li>
                    <li><a target="_blank" href="https://www.facebook.com/Invitaciones-web-112187784608681"><i class="bi bi-facebook"></i></a></li>
                    <li><a target="_blank" href="mailto:siquiero.invitaciones@gmail.com"><i class="bi bi-envelope"></i></a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="./countdwon.js"></script>
    <script src="./js.js"></script>
    <script src="./reproductor.js"></script>
    <script src="./form.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        document.addEventListener("DOMContentLoaded", function () {

    
            // Título de pestaña
            document.title = CONFIG.tituloTab;

            // Textos
            document.getElementById("texto-ubicacion").textContent = CONFIG.textoUbicacion;
            document.getElementById("texto-ubicacion2").textContent = CONFIG.textoUbicacion2;
            document.getElementById("form-title").textContent = CONFIG.textoForm;
            document.getElementById("form-sub").innerHTML = CONFIG.textoFormSub;
            document.getElementById("nombre-end").textContent = CONFIG.nombreFestejado;
            document.getElementById("subtitulo-end").textContent = CONFIG.subtitulo;
            document.getElementById("textarea-mensaje").placeholder = "Dejale un mensaje a " + CONFIG.nombreFestejado;

            // Links
            document.getElementById("btn-mapa").href = encodeURI(CONFIG.linkMapa);
            document.getElementById("btn-agendar").setAttribute("href", CONFIG.linkAgendar);
            const btnAgendar = document.getElementById("btn-agendar");
            if (CONFIG.linkAgendar) {
                btnAgendar.href = CONFIG.linkAgendar;
            } else {
                btnAgendar.style.display = "none";
            }

            // Opciones del select de invitados
            const select = document.getElementById("select-invitados");
            for (let i = 1; i <= CONFIG.maxInvitados; i++) {
                const opt = document.createElement("option");
                opt.value = i;
                opt.textContent = i + (i === 1 ? " persona" : " personas");
                select.appendChild(opt);
            }

            // Action del form
            document.forms["asistenciaform"].action = CONFIG.scriptFormUrl;
        });
    </script>

</body>
</html>
